name: Deploy til simply.com (FTP)

# Kører automatisk ved push til main, og kan også startes manuelt
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # Undgå at to deploys kører oven i hinanden
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Upload til simply.com via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps

          # Repoet spejler hele FTP-roden (public_html + alias-domæner),
          # så vi synkroniserer roden til roden.
          local-dir: ./
          server-dir: ./

          # Filer/mapper der ikke skal med op på serveren
          exclude:
            - "**/.git*"
            - "**/.git*/**"
            - ".github/**"
            - ".context/**"
            - "**/.DS_Store"
            - "README.md"
            - "public_html/index.html-old"
